<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="platform" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e3a8a"/><stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="native" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#065f46"/><stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="880" height="620" rx="18" fill="url(#bg)"/>
  <text x="40" y="48" fill="#e2e8f0" font-size="26" font-weight="700">Lumey Agent Runtime — built in-house, behind a seam</text>
  <text x="40" y="74" fill="#94a3b8" font-size="14">No external agent SDK. The model is a dependency; the runtime is ours.</text>

  <!-- Platform layer -->
  <rect x="40" y="98" width="800" height="92" rx="12" fill="url(#platform)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="60" y="128" fill="#e0e7ff" font-size="16" font-weight="700">PLATFORM  ·  above the seam</text>
  <text x="60" y="152" fill="#c7d2fe" font-size="13">Kanban task  →  POST /tasks/:id/runs  →  live run-trace UI   ·   knows nothing about which runtime ran</text>
  <g fill="#1e1b4b" stroke="#818cf8">
    <rect x="60" y="160" width="150" height="22" rx="6"/><rect x="220" y="160" width="150" height="22" rx="6"/><rect x="380" y="160" width="190" height="22" rx="6"/>
  </g>
  <g fill="#e0e7ff" font-size="11.5" text-anchor="middle">
    <text x="135" y="175">agent control plane</text><text x="295" y="175">run model (M2.1)</text><text x="475" y="175">event bus + trace</text>
  </g>

  <!-- Seam -->
  <rect x="40" y="206" width="800" height="40" rx="10" fill="#111827" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="440" y="231" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">▲ RuntimeAdapter seam — the firewall (M2.2) ▲   swap runtimes = write an adapter</text>

  <!-- Adapters row -->
  <rect x="40" y="262" width="180" height="300" rx="12" fill="#1f2937" stroke="#475569" stroke-width="1.5"/>
  <text x="130" y="290" fill="#cbd5e1" font-size="14" font-weight="700" text-anchor="middle">reference</text>
  <text x="130" y="312" fill="#94a3b8" font-size="11.5" text-anchor="middle">deterministic</text>
  <text x="130" y="328" fill="#94a3b8" font-size="11.5" text-anchor="middle">simulator</text>
  <text x="130" y="352" fill="#64748b" font-size="11" text-anchor="middle">(default — works</text>
  <text x="130" y="367" fill="#64748b" font-size="11" text-anchor="middle">with no model)</text>

  <!-- Native runtime -->
  <rect x="240" y="262" width="600" height="300" rx="12" fill="url(#native)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="262" y="290" fill="#ccfbf1" font-size="15" font-weight="700">native  ·  the in-house runtime</text>

  <!-- LoopController band -->
  <rect x="262" y="304" width="556" height="46" rx="9" fill="#042f2e" stroke="#2dd4bf"/>
  <text x="540" y="325" fill="#99f6e4" font-size="13" font-weight="700" text-anchor="middle">LoopController (M2.7)</text>
  <text x="540" y="342" fill="#5eead4" font-size="11" text-anchor="middle">assemble → complete → record → run tools → repeat   ·   step + token budget rails</text>

  <!-- four components -->
  <g>
    <rect x="262" y="366" width="132" height="120" rx="9" fill="#0b3b35" stroke="#2dd4bf"/>
    <text x="328" y="392" fill="#ccfbf1" font-size="12.5" font-weight="700" text-anchor="middle">ContextEngine</text>
    <text x="328" y="410" fill="#5eead4" font-size="10.5" text-anchor="middle">M2.6</text>
    <text x="328" y="432" fill="#a7f3d0" font-size="10" text-anchor="middle">stable prefix</text>
    <text x="328" y="447" fill="#a7f3d0" font-size="10" text-anchor="middle">compaction</text>
    <text x="328" y="462" fill="#a7f3d0" font-size="10" text-anchor="middle">token budget</text>

    <rect x="404" y="366" width="132" height="120" rx="9" fill="#0b3b35" stroke="#2dd4bf"/>
    <text x="470" y="392" fill="#ccfbf1" font-size="12.5" font-weight="700" text-anchor="middle">ModelClient</text>
    <text x="470" y="410" fill="#5eead4" font-size="10.5" text-anchor="middle">M2.4</text>
    <text x="470" y="432" fill="#a7f3d0" font-size="10" text-anchor="middle">raw HTTP</text>
    <text x="470" y="447" fill="#a7f3d0" font-size="10" text-anchor="middle">local | frontier</text>
    <text x="470" y="462" fill="#a7f3d0" font-size="10" text-anchor="middle">retry · stream</text>

    <rect x="546" y="366" width="132" height="120" rx="9" fill="#0b3b35" stroke="#2dd4bf"/>
    <text x="612" y="392" fill="#ccfbf1" font-size="12.5" font-weight="700" text-anchor="middle">ToolRunner</text>
    <text x="612" y="410" fill="#5eead4" font-size="10.5" text-anchor="middle">M2.5</text>
    <text x="612" y="432" fill="#a7f3d0" font-size="10" text-anchor="middle">zod-validated</text>
    <text x="612" y="447" fill="#a7f3d0" font-size="10" text-anchor="middle">guardrailed</text>
    <text x="612" y="462" fill="#a7f3d0" font-size="10" text-anchor="middle">errors-as-data</text>

    <rect x="688" y="366" width="130" height="120" rx="9" fill="#0b3b35" stroke="#2dd4bf"/>
    <text x="753" y="392" fill="#ccfbf1" font-size="12.5" font-weight="700" text-anchor="middle">Sandbox</text>
    <text x="753" y="410" fill="#5eead4" font-size="10.5" text-anchor="middle">M2.5</text>
    <text x="753" y="432" fill="#a7f3d0" font-size="10" text-anchor="middle">git worktree</text>
    <text x="753" y="447" fill="#a7f3d0" font-size="10" text-anchor="middle">path-guarded</text>
    <text x="753" y="462" fill="#a7f3d0" font-size="10" text-anchor="middle">bounded exec</text>
  </g>

  <!-- model dependency -->
  <rect x="262" y="500" width="556" height="46" rx="9" fill="#0f172a" stroke="#64748b" stroke-dasharray="5 4"/>
  <text x="540" y="528" fill="#cbd5e1" font-size="12" text-anchor="middle">a MODEL (the only dependency) — local vLLM/Ollama  or  a frontier gateway, over an OpenAI-compatible wire</text>

  <text x="40" y="596" fill="#64748b" font-size="11.5">Every turn + tool result → RunStep/RunEvent on the immutable trace. Guardrails enforced server-side at the tool boundary.</text>
</svg>
