<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a0a16"/><stop offset="1" stop-color="#141432"/></linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3730a3"/><stop offset="1" stop-color="#1e3a8a"/></linearGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="920" height="540" rx="18" fill="url(#bg)"/>
  <text x="40" y="46" fill="#f1f5f9" font-size="25" font-weight="800">Two "kits", two directions — don't confuse them</text>
  <text x="40" y="72" fill="#94a3b8" font-size="14">"SDK" usually means the OUTWARD one. "Switch the model" is about the INWARD one. Both are swap-points.</text>

  <!-- Lumey core -->
  <rect x="360" y="190" width="200" height="150" rx="16" fill="url(#core)" stroke="#818cf8" stroke-width="1.5"/>
  <text x="460" y="250" text-anchor="middle" fill="#e0e7ff" font-size="20" font-weight="800">Lumey</text>
  <text x="460" y="272" text-anchor="middle" fill="#c7d2fe" font-size="12">platform + agent runtime</text>
  <text x="460" y="300" text-anchor="middle" fill="#a5b4fc" font-size="11">(kanban · runs · trace)</text>

  <!-- LEFT: Platform SDK (outward) -->
  <g>
    <rect x="40" y="150" width="250" height="235" rx="14" fill="#0b3b35" stroke="#2dd4bf" stroke-width="1.5"/>
    <text x="60" y="178" fill="#5eead4" font-size="13" font-weight="800">① THE PLATFORM SDK  (outward)</text>
    <text x="60" y="198" fill="#99f6e4" font-size="11.5">how OTHER code talks TO Lumey</text>
    <g fill="#042f2e" stroke="#2dd4bf">
      <rect x="60" y="214" width="210" height="30" rx="7"/><rect x="60" y="250" width="210" height="30" rx="7"/><rect x="60" y="286" width="210" height="30" rx="7"/>
    </g>
    <g fill="#ccfbf1" font-size="12" text-anchor="middle">
      <text x="165" y="234">a 3rd-party agent</text>
      <text x="165" y="270">a customer's automation</text>
      <text x="165" y="306">a Python / TS script</text>
    </g>
    <text x="60" y="344" fill="#5eead4" font-size="11">tasks.next · runs.start · runs.events …</text>
    <text x="60" y="362" fill="#5eead4" font-size="11">TypeScript + generated Python</text>
  </g>
  <line x1="290" y1="265" x2="358" y2="265" stroke="#2dd4bf" stroke-width="2" marker-end="url(#ar)"/>
  <text x="300" y="256" fill="#99f6e4" font-size="10.5">drives →</text>

  <!-- RIGHT: ModelClient (inward) -->
  <g>
    <rect x="630" y="150" width="250" height="235" rx="14" fill="#3b2f0b" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="650" y="178" fill="#fde68a" font-size="13" font-weight="800">② THE MODELCLIENT  (inward)</text>
    <text x="650" y="198" fill="#fef08a" font-size="11.5">how Lumey talks TO a model</text>
    <g fill="#431407" stroke="#fbbf24">
      <rect x="650" y="214" width="210" height="30" rx="7"/><rect x="650" y="250" width="210" height="30" rx="7"/><rect x="650" y="286" width="210" height="30" rx="7"/>
    </g>
    <g fill="#fef9c3" font-size="11.5" text-anchor="middle">
      <text x="755" y="234">a model on YOUR server</text>
      <text x="755" y="270">a GPU box / air-gap cluster</text>
      <text x="755" y="306">…or a frontier API (optional)</text>
    </g>
    <text x="650" y="344" fill="#fde68a" font-size="11">it's just a URL (+ optional key)</text>
    <text x="650" y="362" fill="#fde68a" font-size="11">LUMEY_LOCAL_MODEL_URL</text>
  </g>
  <line x1="562" y1="265" x2="628" y2="265" stroke="#fbbf24" stroke-width="2" marker-end="url(#ar)"/>
  <text x="572" y="256" fill="#fde68a" font-size="10.5">calls →</text>

  <text x="40" y="430" fill="#cbd5e1" font-size="13"><tspan font-weight="700" fill="#5eead4">①</tspan> = "the SDK" (a client library). <tspan font-weight="700" fill="#fde68a">②</tspan> = "the model seam" (where you switch models). Both are firewalls — swap what's behind without touching the core.</text>
  <text x="40" y="468" fill="#94a3b8" font-size="12.5">Switching a model = change a URL/env. Plugging a frontier key = same seam, different URL + Authorization header. Same code either way.</text>
  <text x="40" y="500" fill="#64748b" font-size="11.5">"Local" / "self-hosted" never means "this laptop" — it means a model YOU control at an address you choose.</text>
</svg>
