name: E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel any in-flight run for the same branch when a new commit lands.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # Spin up a fresh Postgres for every run. Tests can write freely without
      # polluting any shared state — the service container is torn down with
      # the job.
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: exargen_cc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Backend reads these from process.env at boot. Keep ports aligned with
      # what `playwright.config.ts` and the smoke tests expect locally:
      # frontend on 5174, backend on 3002.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/exargen_cc
      JWT_ACCESS_SECRET: ci-access-secret-32-chars-min-not-used-in-prod-xxxxxxxxxxxxx
      JWT_REFRESH_SECRET: ci-refresh-secret-32-chars-min-not-used-in-prod-xxxxxxxxxxxxxx
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      PORT: 3002
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5174
      PRISMA_LOG_QUERIES: 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install monorepo deps
        run: npm install

      - name: Build shared package
        run: npm run build --workspace=shared

      - name: Generate Prisma client + apply migrations + seed
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx tsx src/seed/index.ts

      # Cache Playwright's browser binaries — they're large (~150MB) and
      # rarely change, so this saves ~30s per run after the first one.
      # Cache key uses the ROOT package-lock.json (this is a workspaces
      # monorepo — there is no `frontend/package-lock.json`). Earlier
      # versions of this workflow used the wrong path which produced an
      # empty hash, so every run hit the same stale cache regardless of
      # the actual Playwright version installed — fine until a version
      # bump landed and the cached chromium binary stopped matching the
      # runtime's expected directory name.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (when cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: frontend
        run: npx playwright install-deps chromium

      - name: TypeScript check (frontend)
        working-directory: frontend
        run: npx tsc -b --noEmit

      - name: TypeScript check (backend)
        working-directory: backend
        run: npx tsc --noEmit

      - name: Start backend (background)
        working-directory: backend
        run: |
          npm run dev > /tmp/backend.log 2>&1 &
          # Wait for /api/v1/auth/login to respond (any response, even 4xx, means up)
          for i in {1..30}; do
            if curl -s -o /dev/null http://localhost:3002/api/v1/auth/login; then
              echo "Backend up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend never came up. Last 50 log lines:"
          tail -n 50 /tmp/backend.log
          exit 1

      - name: Configure frontend to talk to local backend
        working-directory: frontend
        run: echo 'VITE_API_URL=http://localhost:3002' > .env.local

      - name: Start frontend (background)
        working-directory: frontend
        run: |
          npm run dev > /tmp/frontend.log 2>&1 &
          for i in {1..30}; do
            if curl -s -o /dev/null http://localhost:5174/; then
              echo "Frontend up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Frontend never came up. Last 50 log lines:"
          tail -n 50 /tmp/frontend.log
          exit 1

      - name: Run Playwright
        working-directory: frontend
        env:
          PW_BASE_URL: http://localhost:5174
          CI: 'true'
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            /tmp/backend.log
            /tmp/frontend.log
          retention-days: 7
